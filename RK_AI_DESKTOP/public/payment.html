
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK AI Premium - Unlock Your Potential</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0f0f11;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: #6366f1;
            top: -200px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #a855f7;
            bottom: -150px;
            right: -100px;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Payment Card */
        .payment-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 48px;
            width: 100%;
            max-width: 480px;
            margin: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: #a1a1aa;
            font-size: 16px;
            font-weight: 400;
        }

        /* Plan Selection */
        .plan-options {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .plan-option {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .plan-option:hover {
            transform: scale(1.02);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .plan-option.selected {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }

        .plan-option h3 {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .plan-option .price {
            color: #6366f1;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .plan-option .period {
            color: #a1a1aa;
            font-size: 14px;
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #d4d4d8;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px 20px;
            color: #ffffff;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
        }

        .form-input::placeholder {
            color: #71717a;
        }

        .form-input:hover {
            transform: scale(1.01);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .form-input:focus {
            transform: scale(1.01);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* Pay Button */
        .pay-button {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            border: none;
            border-radius: 14px;
            padding: 18px 24px;
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .pay-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.35);
        }

        .pay-button:active {
            transform: scale(0.97);
        }

        .pay-button.processing {
            pointer-events: none;
        }

        .pay-button.success {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.35);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Checkmark */
        .checkmark {
            width: 24px;
            height: 24px;
            display: inline-block;
            stroke-width: 3;
            stroke: white;
            stroke-miterlimit: 10;
            animation: checkmark 0.6s ease-in-out;
        }

        @keyframes checkmark {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        /* Status Text */
        .status-text {
            margin-top: 16px;
            text-align: center;
            color: #a1a1aa;
            font-size: 14px;
            min-height: 24px;
            transition: opacity 0.3s;
        }

        /* Features List */
        .features-list {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .features-list h4 {
            color: #d4d4d8;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: #a1a1aa;
            font-size: 14px;
        }

        .feature-item svg {
            color: #10b981;
            flex-shrink: 0;
        }

        /* Secure Badge */
        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            color: #71717a;
            font-size: 13px;
        }

        .secure-badge svg {
            color: #10b981;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            border-radius: 2px;
            animation: fall 3s ease-out forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Confetti Container -->
    <div id="confetti-container" class="confetti-container"></div>

    <div class="payment-card">
        <div class="header">
            <h1>Unlock RK AI Premium</h1>
            <p>Upgrade your AI experience today</p>
        </div>

        <!-- Plan Selection -->
        <div class="plan-options">
            <div class="plan-option" data-plan="core" onclick="selectPlan('core')">
                <h3>Core</h3>
                <div class="price">₹499</div>
                <div class="period">/ month</div>
            </div>
            <div class="plan-option selected" data-plan="studio" onclick="selectPlan('studio')">
                <h3>Studio</h3>
                <div class="price">₹999</div>
                <div class="period">/ month</div>
            </div>
        </div>

        <!-- Payment Form -->
        <form id="payment-form" onsubmit="handlePayment(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-input" placeholder="your@email.com" required id="email">
            </div>

            <div class="form-group">
                <label>Card Number</label>
                <input type="text" class="form-input" placeholder="4242 4242 4242 4242" required id="card-number" maxlength="19" inputmode="numeric">
            </div>

            <div style="display: flex; gap: 12px;">
                <div class="form-group" style="flex: 1;">
                    <label>Expiry Date</label>
                    <input type="text" class="form-input" placeholder="MM/YY" required id="expiry" maxlength="5">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>CVC</label>
                    <input type="text" class="form-input" placeholder="123" required id="cvc" maxlength="4" inputmode="numeric">
                </div>
            </div>

            <button type="submit" class="pay-button" id="pay-button">
                Pay Now
            </button>
            <div class="status-text" id="status-text"></div>
        </form>

        <!-- Features List -->
        <div class="features-list">
            <h4>Includes:</h4>
            <div class="feature-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Priority Queue Access
            </div>
            <div class="feature-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Matrix Memory
            </div>
            <div class="feature-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Custom AI Models
            </div>
        </div>

        <div class="secure-badge">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            Secure & Encrypted Payment
        </div>
    </div>

    <script>
        let selectedPlan = 'studio';
        let isProcessing = false;

        function selectPlan(plan) {
            selectedPlan = plan;
            document.querySelectorAll('.plan-option').forEach(el => el.classList.remove('selected'));
            document.querySelector(`.plan-option[data-plan="${plan}"]`).classList.add('selected');
        }

        // Format card number
        document.getElementById('card-number').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\s/g, '');
            value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
            e.target.value = value;
        });

        // Format expiry
        document.getElementById('expiry').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.slice(0,2) + '/' + value.slice(2,4);
            }
            e.target.value = value;
        });

        async function handlePayment(e) {
            e.preventDefault();
            if (isProcessing) return;

            isProcessing = true;
            const button = document.getElementById('pay-button');
            const statusText = document.getElementById('status-text');

            // Start processing state
            button.classList.add('processing');
            button.innerHTML = '<span class="spinner"></span>';
            statusText.style.opacity = '1';

            // Status messages sequence
            const statuses = [
                "Securing gateway connection...",
                "Verifying payment details...",
                "Authorizing charge...",
                "Upgrading your RK AI brain..."
            ];

            for (let i = 0; i < statuses.length; i++) {
                statusText.textContent = statuses[i];
                await sleep(i === 0 ? 500 : 1000);
            }

            // Success
            button.classList.remove('processing');
            button.classList.add('success');
            button.innerHTML = `
                <svg class="checkmark" viewBox="0 0 24 24">
                    <path d="M20 6L9 17l-5-5" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            `;

            statusText.textContent = 'Upgrade complete! Redirecting back to RK AI...';
            triggerConfetti();

            // Get URL params
            const urlParams = new URLSearchParams(window.location.search);
            const deviceSlug = urlParams.get('slug');
            const redirectUri = urlParams.get('redirect_uri') || 'rk-ai://payment-success';

            // Send upgrade to backend (simulated for now)
            await fetch('/rk-ai-desktop/billing/upgrade', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Device-Slug': deviceSlug || ''
                },
                body: JSON.stringify({
                    plan: selectedPlan,
                    payment_token: 'tok_simulated_' + Date.now(),
                    slug: deviceSlug
                })
            });

            await sleep(2000);
            window.location.href = redirectUri;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function triggerConfetti() {
            const container = document.getElementById('confetti-container');
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDelay = Math.random() * 1 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.background = ['#6366f1', '#a855f7', '#10b981', '#f59e0b'][Math.floor(Math.random() * 4)];
                container.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }
    </script>
</body>
</html>
